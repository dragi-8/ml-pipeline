stages:
  -ingestion:
    cmd: python src/1.data_ingestion.py
    deps:
      - src/1.data_ingestion.py
      - data/spam.csv
    outs:
      - data/train.csv
      - data/test.csv
  -preprocessing:
    cmd:
      - python src/2.data_preprocessing.py
    deps:
      - data/train.csv
      - data/test.csv
      - src/2.data_preprocessing.py
    outs:
      - data/train_preprocessed.csv
      - data/test_preprocessed.csv
  -feature_engineering:
    cmd:
      - python src\3.feature_engineering.py
    deps:
      - data/train_preprocessed.csv
      - data/test_preprocessed.csv
      - src\3.feature_engineering.py
    outs:
      -  data\processed\train_tfidf.csv
      -  data\processed\test_tfidf.csv
  -model_training:
    cmd:
      - python  src\4.model_building.py
    deps:
      - data\processed\train_tfidf.csv
      - data\processed\test_tfidf.csv
      - src\4.model_building.py
    outs:
      - models\clf_model.pkl
  -model_evaluation:
    cmd:
      - python src\5.model_evaluation.py
    deps:
      - models\clf_model.pkl
      - data\processed\test_tfidf.csv
      - src\5.model_evaluation.py
    outs:
      - reports\classification_report.json
              